services:
  # Express API + static frontend
  - type: web
    name: memos-app
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: memos-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://memos-app.onrender.com  # update with your actual URL

databases:
  - name: memos-db
    databaseName: memos
    user: memos
    plan: free